name: tests
on:
  push:
    branches: [main]
  pull_request:
jobs:
  unit-and-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: run suite (stdlib only, offline)
        run: python3 -m unittest discover -s tests -v
